<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fantasy Score Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="flex-wrapper">
    <!-- Main Fantasy Score Calculator + Stat Breakdown side-by-side -->
    <div class="main-center">
      <div class="container">
        <h1>Fantasy Score Calculator</h1>
        <label for="league">Select League:</label>
        <select id="league" onchange="loadStats()"></select>

        <div id="stats-container"></div>
        <div id="bonus-container"></div>

        <div class="options-row">
          <input type="checkbox" id="hideZero" />
          <label for="hideZero">Hide 0-value stats</label>
        </div>

        <div class="buttons">
          <button class="go" onclick="calculateScore()">Go</button>
          <button class="clear" onclick="clearInputs()">Clear</button>
        </div>

        <h2>TOTAL: Fantasy Score</h2>
        <textarea id="breakdown" readonly></textarea>
        <button class="copy" onclick="copyBreakdown()">Copy Breakdown</button>
      </div>
    </div>

    <!-- Extra breakdown box for NBA, MLB hitter, NFL offense -->
    <div class="main-left">
      <div id="extra-breakdown-box" class="extra-box hidden">
        <div class="extra-box-label">Stat Breakdown</div>
        <div id="extra-breakdown-box" class="extra-box"></div>
      </div>
<div id="toi-container" class="hidden">
  <h3>NHL Time On Ice Calculator</h3>
  
  <div class="stat-group">
    <div class="group-title">Compute TOI for First 3 Periods</div>
    
    <div class="stat-row">
      <div class="stat-label">Total TOI</div>
      <input type="number" id="toi-total-min" placeholder="min" min="0" style="width: 60px;">
      <span>:</span>
      <input type="number" id="toi-total-sec" placeholder="sec" min="0" max="59" style="width: 60px;">
    </div>
    
    <div class="stat-row">
      <div class="stat-label">OT TOI (if applicable)</div>
      <input type="number" id="toi-ot-min" placeholder="min" min="0" style="width: 60px;">
      <span>:</span>
      <input type="number" id="toi-ot-sec" placeholder="sec" min="0" max="59" style="width: 60px;">
    </div>
    
    <div class="stat-row">
      <button onclick="calculateTOI()">Calculate TOI</button>
      <button onclick="clearTOI()">Clear</button>
    </div>
    
    <textarea id="toi-output" rows="4" readonly style="width: 100%; margin-top: 10px;"></textarea>
  </div>

  <div class="stat-group">
    <div class="group-title">Convert "mm:ss" to Decimal</div>
    
    <div class="stat-row">
      <div class="stat-label">Time:</div>
      <input type="number" id="convert-min" placeholder="min" min="0" style="width: 60px;">
      <span>:</span>
      <input type="number" id="convert-sec" placeholder="sec" min="0" max="59" style="width: 60px;">
    </div>
    
    <div class="stat-row">
      <button onclick="convertTOI()">Convert</button>
      <button onclick="clearConversion()">Clear</button>
    </div>
    
    <textarea id="convert-output" rows="2" readonly style="width: 100%; margin-top: 10px;"></textarea>
  </div>

  <!-- This input will be used for the main fantasy score calculation -->
  <div class="stat-row">
    <div class="stat-label">Time On Ice (First 3 Periods) — 0 pts</div>
    <input type="text" class="stat-input" id="stat-Time On Ice" readonly style="background-color: #f0f0f0;">
  </div>
</div>
      <!-- Fight Time calculator only for MMA / Boxing -->
      <div id="fight-time-container" class="fight-box hidden">
        <h3>Fight Time Calculator</h3>
        <div id="fight-rounds"></div>
        <div class="time-inputs">
          <label>Time in Round:</label>
          <input type="number" id="fight-minutes" placeholder="min" min="0" />
          <span>:</span>
          <input type="number" id="fight-seconds" placeholder="sec" min="0" max="59" />
        </div>
        <div class="fight-buttons">
          <button class="go" onclick="calculateFightTime()">Go</button>
          <button class="clear" onclick="clearFightTime()">Clear</button>
        </div>
        <textarea id="fight-time-output" readonly></textarea>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
